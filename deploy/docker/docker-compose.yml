version: "3.8"

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: jamin-backend
    restart: unless-stopped
    ports:
      - "8600:8600"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8600
      - DEBUG=false
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-jamin_industrial_agent}
      - POSTGRES_MAINTENANCE_DB=${POSTGRES_MAINTENANCE_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_SCHEMA=${POSTGRES_SCHEMA:-jamin_industrial_agent}
      - TASK_TRACKING_BACKEND=postgres
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=jamin-token
      - INFLUXDB_ORG=jamin
      - INFLUXDB_BUCKET=industrial_data
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../config:/app/config
    depends_on:
      - postgres
      - influxdb
      - redis
    networks:
      - jamin-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: jamin-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jamin-network

  postgres:
    image: postgres:16-alpine
    container_name: jamin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-jamin_industrial_agent}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jamin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-jamin_industrial_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: jamin-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin123}
      - DOCKER_INFLUXDB_INIT_ORG=jamin
      - DOCKER_INFLUXDB_INIT_BUCKET=industrial_data
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=jamin-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - jamin-network

  redis:
    image: redis:7-alpine
    container_name: jamin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - jamin-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: jamin-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - jamin-network

  prometheus:
    image: prom/prometheus:latest
    container_name: jamin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - jamin-network

  grafana:
    image: grafana/grafana:latest
    container_name: jamin-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - jamin-network

networks:
  jamin-network:
    driver: bridge

volumes:
  postgres-data:
  influxdb-data:
  redis-data:
  chromadb-data:
  prometheus-data:
  grafana-data:
